<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulario-FullStack</title>
</head>
<body>

    <button class="toggle" id="toggleBtn" onclick="toggleDarkMode()" aria-label="Activar modo oscuro"><span id="toggleIcon" style="font-size: 50px;">&#127771;</span></button>
    

    <div class="container">

        <h1>Formulario</h1>

        <form action="" aria-label="Formulario de registro">
            <label for="nombre">Nombre</label>
            <input type="text" id=nombre placeholder="Cosme" required pattern="[a-zA-Z]+" aria-label="Nombre">
            <label for="apellido">Apellido</label>
            <input type="text" id=apellido placeholder="Fulanito" required pattern="[a-zA-Z]+" aria-label="Apellido">
            <label for="email">Email</label>
            <input type="email" id=email placeholder="fulanito@gmail.com" required pattern="^[^@\s]+@[^@\s]+\.[^@\s]+$" title="Ingrese un email válido (ej: usuario@dominio.com)" aria-label="Email">
            <label for="fecha">Fecha</label>
            <input type="date" id=fecha placeholder="01/01/2000" aria-label="Fecha de nacimiento" required>
            <label for="paisDeResidencia">Pais de residencia</label>
            <input type="text" id=paisDeResidencia placeholder="Fulanito Town" required pattern="[a-zA-Z ]+" aria-label="Pais de residencia">
            <button type="submit" id="submitBtn">Enviar</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
